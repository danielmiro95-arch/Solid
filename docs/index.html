<!DOCTYPE html><html lang="es"><head>


<meta charset="UTF-8">
<title>SGS|on — by BeonIt × Repsol</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260427g">
<link rel="stylesheet" href="prototype.css?v=20260427g">

<script>
  (function(){
    var V = '20260427g';
    // Migración por versión: si el storage es de una build anterior, lo reseteamos
    // para evitar que estados antiguos (aiMode collapsed, vista rota, etc) bloqueen al usuario
    var stored = localStorage.getItem('sgson-version');
    if (stored !== V) {
      ['solid-proto','solid-completed','solid-dash-widgets','solid-onboarding'].forEach(function(k){ localStorage.removeItem(k); });
      localStorage.setItem('sgson-version', V);
    }
    // Limpia caches babel/transform de versiones anteriores
    Object.keys(localStorage).forEach(function(k){
      if(k.indexOf('babel')>-1 || k.indexOf('transform')>-1 || k.indexOf('_prototype')>-1) localStorage.removeItem(k);
    });
    localStorage.removeItem('mentor-ia-key');
    window.SOLID_VERSION = V;
    window.MENTOR_IA_API_URL = 'https://solid-platform.vercel.app/api/chat';
  })();
</script>

<style>
  /* Deck-stage slide set lives in its own panel */
  #deck-panel deck-stage { width: 100%; display: block; }
  #canvas-panel { height: calc(100vh - 60px); }
  #canvas-root { width: 100%; height: 100%; }

  /* Hide scrollbars in the main content; keep its scroll */
  body { overflow-x: hidden; }
</style>
<style id="deck-stage-print-page">@page { size: 1920px 1080px; margin: 0; } @media print { html, body { margin: 0 !important; padding: 0 !important; background: none !important; overflow: visible !important; height: auto !important; } * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }</style></head>
<body>

<nav class="shell-tabs">
  <div class="shell-wordmark" style="display:flex;align-items:center;gap:10px;font-style:normal;"><img src="sgs-on-logo.png?v=20260427g" style="height:34px;width:auto" alt="SGS|on"/><div style="width:1px;height:18px;background:var(--line)"></div><span style="font-family:var(--mono);font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-4)">by BeonIt × Repsol</span></div>
  <div class="shell-tabs-list" role="tablist" style="display:none">
    <button class="shell-tab active" data-tab="prototype">Prototype</button>
  </div>
  <div class="shell-meta" id="meta-label" style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4)">Plataforma de formación</div>
</nav>

<!-- Prototype panel -->
<section class="shell-panel" id="prototype-panel">
  <div id="proto-root"></div>
</section>


<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Prototype components + views -->
<script type="text/babel" src="components.jsx?v=20260427g" data-plugins="transform-react-jsx-source" data-filename="components.jsx"></script>
<script type="text/babel" src="prototype-home.jsx?v=20260427g" data-plugins="transform-react-jsx-source" data-filename="prototype-home.jsx"></script>
<script type="text/babel" src="prototype-views.jsx?v=20260427g" data-plugins="transform-react-jsx-source" data-filename="prototype-views.jsx"></script>
<script type="text/babel" src="mentor-ia.jsx?v=20260427g" data-plugins="transform-react-jsx-source" data-filename="mentor-ia.jsx"></script>
<script type="text/babel" src="prototype-main.jsx?v=20260427g" data-plugins="transform-react-jsx-source" data-filename="prototype-main.jsx"></script>

<!-- Boot -->
<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-7">
(function(){
  // Activamos siempre el panel del prototipo. Los tabs deck/canvas están
  // ocultos en producción; mantenemos el código defensivo por si el shell vuelve.
  function activate(tab){
    ['prototype','deck','canvas'].forEach(t => {
      const btn = document.querySelector('.shell-tab[data-tab="' + t + '"]');
      if (btn) btn.classList.toggle('active', t === tab);
      const panel = document.getElementById(t + '-panel');
      if (panel) panel.classList.toggle('active', t === tab);
    });
    const label = document.getElementById('meta-label');
    if (label) label.textContent = 'Plataforma de formación';
  }

  document.querySelectorAll('.shell-tab').forEach(btn => {
    btn.addEventListener('click', () => activate(btn.getAttribute('data-tab')));
  });
  activate('prototype');

  // Vaciamos cualquier HTML pre-renderizado heredado de cuando esto era un
  // Claude artifact, para que React monte limpio
  var protoEl = document.getElementById('proto-root');
  if (protoEl) {
    protoEl.innerHTML = '';
    ReactDOM.createRoot(protoEl).render(<PrototypeApp/>);
  }

  // Deck y Canvas solo se montan si sus tabs están visibles. Como están
  // ocultas, no hacemos nada — ahorra ciclos y evita errores si los componentes
  // tienen dependencias rotas.
})();
</script>



</body></html>
