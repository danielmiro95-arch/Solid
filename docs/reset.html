<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>SGS|on · Reset cache</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg,#F6F7F9,#EDF0F5); color:#0B1220; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { max-width:520px; width:100%; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border:1px solid rgba(11,18,38,0.10); border-radius:16px; padding:36px 32px; text-align:center; box-shadow:0 24px 60px rgba(11,18,38,0.15); }
  h1 { font-size:28px; font-weight:800; letter-spacing:-0.025em; margin:0 0 8px; }
  .sub { font-size:14px; color:rgba(11,18,38,0.65); margin-bottom:24px; line-height:1.5; }
  .step { display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(11,18,38,0.04); border-radius:8px; margin-bottom:8px; font-size:13px; text-align:left; }
  .step .icon { font-size:18px; }
  .step.done .icon { color:#BCD630; }
  .step.fail .icon { color:#E50914; }
  .btn { display:inline-block; margin-top:20px; padding:14px 28px; background:#2D6BF6; color:#fff; text-decoration:none; border-radius:8px; font-weight:700; font-size:14px; box-shadow:0 8px 24px rgba(0,0,0,0.3); transition:transform .15s; cursor:pointer; border:none; }
  .btn:hover { transform:translateY(-2px); }
  .countdown { font-size:12px; color:rgba(11,18,38,0.5); margin-top:14px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div class="card">
  <h1>🧹 Limpiando caché</h1>
  <p class="sub">Tu navegador tiene archivos antiguos de SGS|on guardados. Vamos a borrarlos para que cargues la última versión.</p>
  <div id="steps">
    <div class="step" id="s-sw">      <span class="icon">⏳</span> <span>Desregistrar service workers</span></div>
    <div class="step" id="s-caches"> <span class="icon">⏳</span> <span>Borrar cachés de la API CacheStorage</span></div>
    <div class="step" id="s-ls">     <span class="icon">⏳</span> <span>Limpiar localStorage</span></div>
    <div class="step" id="s-ss">     <span class="icon">⏳</span> <span>Limpiar sessionStorage</span></div>
  </div>
  <a id="goBtn" class="btn" href="/?nocache=1" style="display:none">Ir a la app limpia →</a>
  <div class="countdown" id="cd"></div>
</div>

<script>
(async function(){
  function done(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add('done');
    el.querySelector('.icon').textContent = '✅';
  }
  function fail(id, msg) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add('fail');
    el.querySelector('.icon').textContent = '⚠️';
    var t = el.querySelector('span:last-child');
    if (t && msg) t.textContent = t.textContent + ' (' + msg + ')';
  }

  // 1. Desregistrar service workers
  try {
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var i = 0; i < regs.length; i++) {
        await regs[i].unregister();
      }
      done('s-sw');
    } else {
      done('s-sw');
    }
  } catch (e) { fail('s-sw', e.message); }

  // 2. Borrar Cache Storage (donde el SW guarda los archivos)
  try {
    if (typeof caches !== 'undefined') {
      var names = await caches.keys();
      for (var j = 0; j < names.length; j++) {
        await caches.delete(names[j]);
      }
      done('s-caches');
    } else {
      done('s-caches');
    }
  } catch (e) { fail('s-caches', e.message); }

  // 3. localStorage (perfil, settings, bookmarks, etc.)
  try { localStorage.clear(); done('s-ls'); }
  catch (e) { fail('s-ls', e.message); }

  // 4. sessionStorage
  try { sessionStorage.clear(); done('s-ss'); }
  catch (e) { fail('s-ss', e.message); }

  // Show button + 5s countdown auto-redirect
  document.getElementById('goBtn').style.display = 'inline-block';
  var n = 5;
  var cd = document.getElementById('cd');
  cd.textContent = 'Auto-redirige en ' + n + 's…';
  var t = setInterval(function(){
    n--;
    if (n > 0) cd.textContent = 'Auto-redirige en ' + n + 's…';
    else {
      clearInterval(t);
      location.href = '/?nocache=' + Date.now();
    }
  }, 1000);
})();
</script>
</body></html>
