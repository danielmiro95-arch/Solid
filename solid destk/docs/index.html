<script>
  (function(){
    var V = '20260427x';
    // Migración por versión: si el storage es de una build anterior, lo reseteamos
    // para evitar que estados antiguos (aiMode collapsed, vista rota, etc) bloqueen al usuario
    var stored = localStorage.getItem('sgson-version');
    if (stored !== V) {
      ['solid-proto','solid-completed','solid-dash-widgets','solid-onboarding'].forEach(function(k){ localStorage.removeItem(k); });
      localStorage.setItem('sgson-version', V);
    }
    // Limpia caches babel/transform de versiones anteriores
    Object.keys(localStorage).forEach(function(k){
      if(k.indexOf('babel')>-1 || k.indexOf('transform')>-1 || k.indexOf('_prototype')>-1) localStorage.removeItem(k);
    });
    localStorage.removeItem('mentor-ia-key');
    window.SOLID_VERSION = V;
    // /api/chat relativo: funciona en cualquier dominio (solid.vercel.app, solid-u3yh.vercel.app, etc.)
    // Si necesitas apuntar a un dominio cross-origin, define window.MENTOR_IA_API_URL antes.
    window.MENTOR_IA_API_URL = window.MENTOR_IA_API_URL || '/api/chat';
  })();
</script>

<!-- Prototype panel -->
<section class="shell-panel" id="prototype-panel">
  <div id="proto-root">
    <!-- Fallback visible si la app NO monta. React lo borrará en cuanto monte; si lo ves, la app no arrancó. -->
    <div id="boot-error" style="font-family:system-ui,sans-serif;padding:48px 24px;max-width:640px;margin:80px auto;color:#0D1117">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#94A3B8;margin-bottom:8px">SGS|on · cargando…</div>
      <h1 style="margin:0 0 12px;font-size:28px;letter-spacing:-0.02em">Si esto persiste más de 5 segundos, la app no ha podido cargar.</h1>
      <p style="font-size:14px;line-height:1.55;color:#4A5568;margin:0 0 16px">Posibles causas: tu navegador bloquea CDNs externos (unpkg.com), o un script .jsx ha fallado al transformar.</p>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;background:#F5F7FA;padding:12px 14px;border-radius:6px;color:#1C2433">Abre la consola (F12) y mira los errores en rojo.</div>
    </div>

<!-- React + Babel (sin integrity SRI: las CDN cambian la minificación de vez en cuando y rompen el hash, dejando la app sin cargar) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Supabase SDK · solo activa si hay env vars en Vercel (SUPABASE_URL + SUPABASE_ANON_KEY) -->
<script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script>
// Bootstrap del backend. Si /api/config devuelve keys de Supabase, activa
// modo SaaS real. Si no, fallback a modo demo client-side con localStorage.
(function(){
  window.SGSON_BACKEND = 'demo'; // se cambia a 'supabase' si hay config
  window.SGSON_BACKEND_READY = false;
  fetch('/api/config').then(function(r){ return r.ok ? r.json() : null; }).then(function(cfg){
    if (cfg && cfg.supabaseUrl && cfg.supabaseAnonKey && window.supabase) {
      window.SUPABASE_URL = cfg.supabaseUrl;
      window.SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
      window.supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
      });
      window.SGSON_BACKEND = 'supabase';
      console.log('[SGS|on] Backend: Supabase ✓', cfg.supabaseUrl);
    } else {
      console.log('[SGS|on] Backend: demo (localStorage)');
    }
    window.SGSON_BACKEND_READY = true;
    window.dispatchEvent(new Event('sgson-backend-ready'));
  }).catch(function(e){
    console.warn('[SGS|on] /api/config no disponible — modo demo', e && e.message);
    window.SGSON_BACKEND_READY = true;
    window.dispatchEvent(new Event('sgson-backend-ready'));
  });
})();
</script>

<!-- Boot -->
<script type="text/babel">
(function(){
  function showBootError(title, detail) {
    var protoEl = document.getElementById('proto-root');
    if (!protoEl) return;
    protoEl.innerHTML = ''
      + '<div style="font-family:system-ui,sans-serif;padding:48px 24px;max-width:720px;margin:60px auto;color:#0D1117">'
      + '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#EB0029;margin-bottom:8px">SGS|on · arranque fallido</div>'
      + '<h1 style="margin:0 0 12px;font-size:24px;letter-spacing:-0.02em">' + title + '</h1>'
      + '<pre style="font-family:\'JetBrains Mono\',monospace;font-size:12px;background:#F5F7FA;padding:14px 16px;border-radius:8px;white-space:pre-wrap;word-break:break-word;color:#1C2433;margin:0;line-height:1.5">' + detail + '</pre>'
      + '<div style="margin-top:14px;font-size:13px;color:#4A5568">Abre la consola (F12 → Console) para más detalle. Comparte la captura para diagnosticar.</div>'
      + '</div>';
  }

  // Capturar cualquier error global durante el arranque
  window.addEventListener('error', function(ev){
    var msg = (ev.error && ev.error.stack) || ev.message || 'Error sin detalle';
    showBootError('Error de JavaScript durante la carga', String(msg));
  });

  try {
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
      showBootError('React no se cargó', 'Las CDNs unpkg.com pueden estar bloqueadas por tu red/VPN. Comprueba en la consola la pestaña Network: ¿react.production.min.js cargó?');
      return;
    }

    function activate(tab){
      ['prototype','deck','canvas'].forEach(function(t){
        var btn = document.querySelector('.shell-tab[data-tab="' + t + '"]');
        if (btn) btn.classList.toggle('active', t === tab);
        var panel = document.getElementById(t + '-panel');
        if (panel) panel.classList.toggle('active', t === tab);
      });
      var label = document.getElementById('meta-label');
      if (label) label.textContent = 'Plataforma de formación';
    }

    document.querySelectorAll('.shell-tab').forEach(function(btn){
      btn.addEventListener('click', function(){ activate(btn.getAttribute('data-tab')); });
    });
    activate('prototype');

    if (typeof PrototypeApp === 'undefined') {
      showBootError('Componente PrototypeApp no definido', 'Alguno de los .jsx no se cargó o falló al transformar. Comprueba la consola por errores de Babel/sintaxis.');
      return;
    }

    var protoEl = document.getElementById('proto-root');
    if (protoEl) {
      protoEl.innerHTML = '';
      ReactDOM.createRoot(protoEl).render(<PrototypeApp/>);
    }
  } catch (err) {
    showBootError('Excepción al montar React', (err && err.stack) || String(err));
  }
})();
</script>
